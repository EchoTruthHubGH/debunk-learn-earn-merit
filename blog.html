<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigative Commentaries | Echo Truth Hub</title>
<meta name="description" content="Deep dives into claims, evidence, and truth. Where facts meet scrutiny.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
html {overflow-x:hidden;max-width:100%;}
body {margin:0;background:#0A0F14;color:#fff;font-family:system-ui,-apple-system,sans-serif;line-height:1.7;overflow-x:hidden;max-width:100%;width:100%;}
*, *::before, *::after {box-sizing:border-box;}
header {padding:2rem 0;text-align:center;border-bottom:1px solid rgba(0,191,166,0.2);width:100%;overflow:hidden;}
.header-container {max-width:1400px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.title-block a {text-decoration:none;color:#fff;}
.logo {font-size:2rem;font-weight:900;color:#fff;}
.tagline {font-size:1.2rem;color:#fff;opacity:0.9;margin-top:0.5rem;}
.nav a {color:#00BFA6;text-decoration:none;margin:0 1rem;font-weight:600;}
.nav a:hover, .nav a.active {color:#FFB800;}

/* HERO WITH IMAGE - only change */
.hero {
  position: relative;
  padding: 6rem 2rem;
  text-align: center;
  background-image: url('teaser-hero.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(10,15,20,0.35) 0%, rgba(10,15,20,0.65) 65%, #0A0F14 100%);
  z-index: 1;
}

.category-filter {background:rgba(0,191,166,0.05);padding:1.5rem 1rem;border-bottom:1px solid rgba(0,191,166,0.2);width:100%;overflow:hidden;}
.filter-container {max-width:1400px;margin:0 auto;display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;width:100%;}
@media (max-width:1024px) {
  .filter-container {flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;width:100%;}
  .filter-container::-webkit-scrollbar {display:none;}
  .filter-label,.category-tag {flex-shrink:0;}
}
.filter-label {font-weight:600;color:#00BFA6;font-size:0.9rem;text-transform:uppercase;letter-spacing:0.5px;}
.category-tag {padding:0.5rem 1rem;border-radius:20px;border:1px solid rgba(0,191,166,0.3);background:rgba(0,191,166,0.1);color:#00BFA6;font-size:0.9rem;font-weight:500;transition:all 0.2s;cursor:pointer;text-decoration:none;display:inline-block;}
.category-tag:hover, .category-tag.active {background:#00BFA6;color:#0A0F14;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,191,166,0.3);}
.sticky-bounty-mobile {display:none;}
.main-wrapper {max-width:1400px;margin:0 auto;padding:3rem 20px;display:grid;grid-template-columns:1fr 400px;gap:4rem;width:100%;}
.featured-article {margin-bottom:4rem;border-radius:16px;overflow:hidden;background:rgba(0,191,166,0.05);border:1px solid rgba(0,191,166,0.2);transition:transform 0.3s,box-shadow 0.3s;}
.featured-article:hover {transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,191,166,0.2);}
.featured-image {width:100%;height:400px;background-size:cover;background-position:center;background-repeat:no-repeat;position:relative;overflow:hidden;}
.featured-content {padding:2.5rem;}
.featured-content h2 {font-size:2.2rem;font-weight:700;margin:0 0 1rem;line-height:1.2;color:#FFB800;}
.featured-content p {margin-bottom:1.2em;color:rgba(255,255,255,0.85);line-height:1.7;}
.card-meta {display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.featured-category {display:inline-block;padding:0.4rem 0.8rem;border-radius:4px;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;background:#FFB800;color:#0A0F14;}
.featured-category.debunked {background:#ff6b6b;color:#0A0F14;}
.featured-category.opinion {background:#8b5cf6;color:#fff;}
.read-time-badge {display:inline-flex;align-items:center;gap:0.35rem;font-size:0.78rem;color:rgba(255,255,255,0.5);font-family:monospace;}
.read-time-badge i {color:#00BFA6;font-size:0.75rem;}
.read-btn {display:inline-block;margin-top:1rem;padding:0.8rem 1.8rem;background:#00BFA6;color:#0A0F14 !important;text-decoration:none !important;-webkit-text-fill-color:#0A0F14;border-radius:8px;font-weight:700;transition:all 0.2s;}
.read-btn:hover {background:#FFB800;}
.sidebar {position:sticky;top:100px;height:fit-content;}
.sidebar-section {background:rgba(0,191,166,0.1);padding:2.5em;border-radius:16px;margin-bottom:3rem;border-left:5px solid #00BFA6;}
.sidebar-section h3 {font-size:2em;color:#FFB800;text-align:center;margin-bottom:1rem;}
.bounty-card {text-align:center;}
.bounty-btn {display:inline-block;margin-top:1rem;padding:1rem 2rem;background:#00BFA6;color:#0A0F14 !important;text-decoration:none !important;-webkit-text-fill-color:#0A0F14;border-radius:8px;font-weight:700;transition:all 0.2s;}
.bounty-btn:hover {background:#FFB800;transform:translateY(-2px);}
.countdown {font-size:1.3em;color:#FFB800;margin:1rem 0;font-weight:600;}
.mollie-badge {max-width:180px;height:auto;opacity:0.9;margin-top:1rem;}
.x-logo {width:24px;height:24px;vertical-align:middle;margin-left:8px;opacity:0.9;}
.x-feed-container {border-radius:16px;overflow:hidden;min-height:400px;background:rgba(0,191,166,0.05);}
footer {margin:140px 0 60px;text-align:center;color:#888;font-size:0.95em;border-top:1px solid rgba(0,191,166,0.2);padding-top:3rem;}
footer a {color:#00BFA6;margin:0 1rem;text-decoration:none;}
footer a:hover {color:#FFB800;}
@keyframes rain {0%{background-position:0 0}100%{background-position:0 2000px}}
@keyframes pulse-swarm {0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.8;transform:scale(1.08)}}
.code-rain {position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,#0f0 2px,#0f0 4px),repeating-linear-gradient(90deg,transparent,transparent 2px,#0f0 2px,#0f0 4px);background-size:100% 100px;animation:rain 20s linear infinite;opacity:0.07;pointer-events:none;}
.swarm-motion {position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(200,0,0,0.15),transparent 70%),radial-gradient(circle at 70% 60%,rgba(200,0,0,0.12),transparent 70%);animation:pulse-swarm 12s ease-in-out infinite;mix-blend-mode:screen;pointer-events:none;}
.vignette {position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.5) 60%,rgba(0,0,0,0.75) 100%);pointer-events:none;}
@keyframes glassFlickerCard {0%,100%{opacity:1}7%{opacity:0.88}8%{opacity:1}45%{opacity:1}46%{opacity:0.93}47%{opacity:1}}
.wired-card-img {animation:glassFlickerCard 8s ease-in-out 1s infinite;}
@keyframes amber-pulse {0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes dust {0%{transform:translateY(0)translateX(0);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-80px)translateX(20px);opacity:0}}
.teaser-article {margin-bottom:4rem;border-radius:16px;overflow:hidden;background:rgba(0,191,166,0.03);border:1px solid rgba(255,184,0,0.25);transition:transform 0.3s,box-shadow 0.3s;position:relative;}
.teaser-article:hover {transform:translateY(-4px);box-shadow:0 10px 30px rgba(255,184,0,0.15);}
.teaser-image-wrap {width:100%;height:400px;position:relative;overflow:hidden;background:#000;}
.teaser-bg {position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.55) saturate(0.9);transition:filter 0.4s;}
.teaser-article:hover .teaser-bg {filter:brightness(0.65) saturate(1.1);}
.teaser-amber-glow {position:absolute;inset:0;background:radial-gradient(ellipse at 50% 65%,rgba(255,184,0,0.18) 0%,transparent 65%);animation:amber-pulse 3s ease-in-out infinite;pointer-events:none;}
.teaser-dust {position:absolute;inset:0;pointer-events:none;}
.teaser-dust::before,.teaser-dust::after {content:'';position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,184,0,0.5);animation:dust 6s ease-in-out infinite;}
.teaser-dust::before {left:40%;top:60%;animation-delay:0s;}
.teaser-dust::after {left:60%;top:70%;animation-delay:2.5s;}
.teaser-vignette {position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.15) 40%,rgba(0,0,0,0.6) 100%);pointer-events:none;}
.teaser-text-overlay {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;pointer-events:none;z-index:10;}
.teaser-frame {display:block;width:80%;margin:0 auto;padding:1.2rem 2.2rem 1rem;border:2px solid rgba(255,184,0,0.6);border-radius:4px;background:rgba(0,0,0,0.35);box-shadow:0 0 20px rgba(255,184,0,0.2),inset 0 0 20px rgba(255,184,0,0.05);animation:amber-pulse 3s ease-in-out infinite;}
.typewriter-line1,.typewriter-line2 {display:block;overflow:hidden;white-space:nowrap;font-family:'Courier New',Courier,monospace;letter-spacing:0.15em;}
.typewriter-line1 {font-size:clamp(0.75rem,1.8vw,1.2rem);font-weight:700;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.3);border-right:3px solid #FFB800;max-width:0;animation:typing1 2.6s steps(26,end) 0.5s forwards,blink-cursor 0.75s step-end infinite;}
.typewriter-line2 {font-size:clamp(1.1rem,2.5vw,1.8rem);font-weight:900;color:#FFB800;text-shadow:0 0 15px rgba(255,184,0,0.6);max-width:0;opacity:0;animation:delay-show 3.4s forwards,typing2 0.8s steps(3,end) 3.4s forwards;}
@keyframes typing1 {from{max-width:0}to{max-width:100%}}
@keyframes typing2 {from{max-width:0}to{max-width:100%}}
@keyframes delay-show {0%,99%{opacity:0}100%{opacity:1}}
@keyframes blink-cursor {from,to{border-color:transparent}50%{border-color:#FFB800}}
.teaser-badge {position:absolute;top:1.2rem;right:1.2rem;background:rgba(255,184,0,0.15);border:1px solid rgba(255,184,0,0.4);color:#FFB800;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:0.3rem 0.7rem;border-radius:3px;z-index:11;}
.teaser-content {padding:2rem 2.5rem;border-top:1px solid rgba(255,184,0,0.15);}
.teaser-content h2 {font-size:1.8rem;font-weight:700;color:rgba(255,255,255,0.6);margin:0 0 0.5rem;font-style:italic;letter-spacing:0.02em;}
.teaser-content p {color:rgba(255,255,255,0.4);font-size:0.95rem;margin:0;font-style:italic;}
@media (max-width:1024px) {
  .main-wrapper {grid-template-columns:1fr;gap:3rem;padding-top:0;}
  .sidebar {position:static;display:flex;flex-direction:column;}
  .sticky-bounty-mobile {display:block;position:sticky;top:0;z-index:100;background:rgba(10,15,20,0.98);backdrop-filter:blur(10px);border-bottom:2px solid #00BFA6;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
  .sticky-bounty-mobile .bounty-compact {display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .sticky-bounty-mobile .bounty-info {flex:1;min-width:0;}
  .sticky-bounty-mobile .bounty-title {font-size:0.95rem;font-weight:700;color:#FFB800;margin:0 0 4px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sticky-bounty-mobile .bounty-meta-compact {display:flex;gap:12px;font-size:0.85rem;color:#00BFA6;}
  .sticky-bounty-mobile .bounty-btn {padding:10px 20px;font-size:0.9rem;white-space:nowrap;margin:0;}
  .x-feed-container {max-height:400px;overflow-y:auto;}
}
@media (max-width:640px) {
  .hero h1 {font-size:2.4em;} .hero p {font-size:1.4em;}
  .filter-container {width:100%;}
  .typewriter-line1 {font-size:0.85rem;}
  .typewriter-line2 {font-size:1.2rem;}
}
</style>
</head>
